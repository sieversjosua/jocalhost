<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jocalhost monogram variants</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: #0b1220;
      background: #f8fafc;
    }

    body {
      margin: 0;
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      color: #475569;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
      gap: 18px;
    }

    figure {
      margin: 0;
    }

    img {
      width: 100%;
      display: block;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgb(15 23 42 / 0.12);
    }

    figcaption {
      margin-top: 8px;
      font-size: 12px;
      color: #475569;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>jocalhost monogram variants</h1>
  <p>Font directions: SF, Avenir Next, Futura, Menlo, New York. Palettes: dark, blue, graphite, light.</p>
  <main class="grid">
    <figure><img src="jo-sf-dark.svg" alt="SF dark"><figcaption>SF / dark</figcaption></figure>
    <figure><img src="jo-sf-blue.svg" alt="SF blue"><figcaption>SF / blue</figcaption></figure>
    <figure><img src="jo-sf-graphite.svg" alt="SF graphite"><figcaption>SF / graphite</figcaption></figure>
    <figure><img src="jo-sf-light.svg" alt="SF light"><figcaption>SF / light</figcaption></figure>
    <figure><img src="jo-avenir-dark.svg" alt="Avenir dark"><figcaption>Avenir / dark</figcaption></figure>
    <figure><img src="jo-avenir-blue.svg" alt="Avenir blue"><figcaption>Avenir / blue</figcaption></figure>
    <figure><img src="jo-avenir-graphite.svg" alt="Avenir graphite"><figcaption>Avenir / graphite</figcaption></figure>
    <figure><img src="jo-avenir-light.svg" alt="Avenir light"><figcaption>Avenir / light</figcaption></figure>
    <figure><img src="jo-futura-dark.svg" alt="Futura dark"><figcaption>Futura / dark</figcaption></figure>
    <figure><img src="jo-futura-blue.svg" alt="Futura blue"><figcaption>Futura / blue</figcaption></figure>
    <figure><img src="jo-futura-graphite.svg" alt="Futura graphite"><figcaption>Futura / graphite</figcaption></figure>
    <figure><img src="jo-futura-light.svg" alt="Futura light"><figcaption>Futura / light</figcaption></figure>
    <figure><img src="jo-mono-dark.svg" alt="Mono dark"><figcaption>Mono / dark</figcaption></figure>
    <figure><img src="jo-mono-blue.svg" alt="Mono blue"><figcaption>Mono / blue</figcaption></figure>
    <figure><img src="jo-mono-graphite.svg" alt="Mono graphite"><figcaption>Mono / graphite</figcaption></figure>
    <figure><img src="jo-mono-light.svg" alt="Mono light"><figcaption>Mono / light</figcaption></figure>
    <figure><img src="jo-newyork-dark.svg" alt="New York dark"><figcaption>New York / dark</figcaption></figure>
    <figure><img src="jo-newyork-blue.svg" alt="New York blue"><figcaption>New York / blue</figcaption></figure>
    <figure><img src="jo-newyork-graphite.svg" alt="New York graphite"><figcaption>New York / graphite</figcaption></figure>
    <figure><img src="jo-newyork-light.svg" alt="New York light"><figcaption>New York / light</figcaption></figure>
  </main>
</body>
</html>
