<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jocalhost mono color variants</title>
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: #0b1220;
      background: #f8fafc;
    }

    body {
      margin: 0;
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      color: #475569;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
      gap: 18px;
    }

    figure {
      margin: 0;
    }

    img {
      width: 100%;
      display: block;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgb(15 23 42 / 0.12);
    }

    figcaption {
      margin-top: 8px;
      font-size: 12px;
      color: #475569;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>jocalhost mono color variants</h1>
  <p>Same Menlo/SF Mono monogram, only color changes.</p>
  <main class="grid">
    <figure><img src="mono-01-midnight.svg" alt="Midnight"><figcaption>01 midnight</figcaption></figure>
    <figure><img src="mono-02-black.svg" alt="Black"><figcaption>02 black</figcaption></figure>
    <figure><img src="mono-03-carbon.svg" alt="Carbon"><figcaption>03 carbon</figcaption></figure>
    <figure><img src="mono-04-graphite.svg" alt="Graphite"><figcaption>04 graphite</figcaption></figure>
    <figure><img src="mono-05-brand-blue.svg" alt="Brand blue"><figcaption>05 brand blue</figcaption></figure>
    <figure><img src="mono-06-blueprint.svg" alt="Blueprint"><figcaption>06 blueprint</figcaption></figure>
    <figure><img src="mono-07-terminal-green.svg" alt="Terminal green"><figcaption>07 terminal green</figcaption></figure>
    <figure><img src="mono-08-mint.svg" alt="Mint"><figcaption>08 mint</figcaption></figure>
    <figure><img src="mono-09-amber.svg" alt="Amber"><figcaption>09 amber</figcaption></figure>
    <figure><img src="mono-10-warm-slate.svg" alt="Warm slate"><figcaption>10 warm slate</figcaption></figure>
  </main>
</body>
</html>
